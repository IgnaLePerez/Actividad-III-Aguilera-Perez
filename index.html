<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad III</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Actividad III: Formularios</h1>
    </header>
    <body>
        <h2>Formulario de compra</h2>
        <p>Complete el formulario para llevar a cabo la compra</p>
        <form action="post">
            Nombre Completo: <input type="text", placeholder="Nombre-Apellido"> <br/>
            DNI: <input type="number", placeholder = "12345678"> <br/>
            Fecha de nacimiento <input type="datetime" placeholder="DD-MM-AAAA"> <br/>
            Método de pago:
            <select name="Método de pago">
                <option>Visa</option>
                <option>Mastercard</option>
                <option>Otro</option>
            </select> 
            <input type="submit" value="Comprar" >
            <input type="reset" value="Reiniciar">

        </form>
    </body>
    <footer>
        <p>Gracias por usar nuestra pagina!</p>
    </footer>
</body>
</html>
